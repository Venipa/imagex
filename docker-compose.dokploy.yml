services:
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  imagex:
    build:
      context: .
      dockerfile: Dockerfile
    # ports:
    #   - "3000:3000"
    environment:
      PORT: "3000"
      ORIGIN_HOST: ${ORIGIN_HOST:-"*"}
      HOSTNAMES: ${HOSTNAMES:-"*"}
      ALLOWED_RESPONSE_CATEGORIES: ${ALLOWED_RESPONSE_CATEGORIES:-json,xml,html,yml,text}
      DOMAIN_WHITELIST: ${DOMAIN_WHITELIST:-}
      DOMAIN_BLACKLIST: ${DOMAIN_BLACKLIST:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      IMAGE_CACHE_DIR: ${IMAGE_CACHE_DIR:-.imagex/cache}
      IMAGE_TRANSFORM_DIR: ${IMAGE_TRANSFORM_DIR:-.imagex/transform}
      DATASOURCE_ENABLE_S3: ${DATASOURCE_ENABLE_S3:-false}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_TRANSFORM_CACHE_PREFIX: ${S3_TRANSFORM_CACHE_PREFIX:-.imagex/transform}
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - imagex-data:/data

volumes:
  redis-data:
  imagex-data: